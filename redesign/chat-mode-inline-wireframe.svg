<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="680" height="620" role="img">
  <title>Chat mode — inline display variant</title>
  <desc>Chat mode with inline display rendered as a ghost-text continuation. The assistant turn block contains accepted text in normal color and the candidate immediately following in lighter color, on the same paragraph. Cycle chevrons, a Keep button, and meta info float on a single row below the ghost-text region. End turn button sits at the foot of the assistant block. Behavior identical to chat-mode cards; only the visual differs.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .t  { font-size: 13px; fill: #2C2C2A; }
    .ts { font-size: 11px; fill: #5F5E5A; }
    .th { font-size: 16px; font-weight: 500; fill: #2C2C2A; }
    .frame { fill: none; stroke: #888780; stroke-width: 0.5; }
    .div   { stroke: #888780; stroke-width: 0.5; fill: none; }
    .line  { stroke: #D3D1C7; stroke-width: 0.5; }
    .system { fill: #F1EFE8; stroke: none; }
    .userturn { fill: none; stroke: #D3D1C7; stroke-width: 0.5; }
    .turn { fill: #FAFAF7; stroke: #D3D1C7; stroke-width: 0.5; }
  </style>

  <text x="0" y="20" class="th">Chat mode inline — candidate continues the sentence directly</text>

  <rect x="0" y="36" width="680" height="500" rx="4" class="frame"/>
  <line x1="0" y1="62" x2="680" y2="62" class="div"/>
  <text x="8" y="54" class="ts">Branching Workbook · chat-test</text>
  <text x="500" y="54" class="ts">model · 612/8k · close project</text>

  <line x1="100" y1="62" x2="100" y2="508" class="div"/>
  <text x="8" y="78" class="ts">TREE</text>
  <text x="8" y="98" class="t">root</text>
  <text x="20" y="118" class="ts" style="fill:#888780;">system</text>
  <text x="20" y="138" class="t">user</text>
  <text x="32" y="158" class="t">asst…</text>

  <rect x="112" y="74" width="556" height="28" rx="6" class="system"/>
  <text x="124" y="92" class="ts" style="fill:#5F5E5A;">▸ SYSTEM · You are a helpful writing assistant. Match the tone of the prompt and …</text>

  <rect x="112" y="118" width="556" height="56" rx="6" class="userturn"/>
  <text x="124" y="136" class="ts" style="fill:#888780;">YOU</text>
  <text x="124" y="156" class="t">Tell me a short story about a lighthouse keeper who hasn't had a visitor</text>
  <text x="124" y="172" class="t">in seventeen years.</text>

  <rect x="112" y="190" width="556" height="240" rx="6" class="turn"/>
  <text x="124" y="208" class="ts" style="fill:#888780;">ASSISTANT · in progress · 22 tok</text>

  <text x="124" y="234" class="t">The lighthouse keeper had not had a visitor in seventeen</text>
  <text x="124" y="254" class="t">years.<tspan style="fill:#888780;"> So when the door creaked open on a wet Tuesday</tspan></text>
  <text x="124" y="274" style="font-size:13px; fill:#888780; font-family:inherit;">evening, his first instinct was to ignore it and hope they</text>
  <text x="124" y="294" style="font-size:13px; fill:#888780; font-family:inherit;">would leave him in peace.</text>

  <g transform="translate(124, 312)">
    <rect x="0" y="0" width="56" height="22" rx="11" fill="#FAFAF7" stroke="#888780" stroke-width="0.5"/>
    <path d="M14 11 L19 6 L19 16 Z" fill="#5F5E5A"/>
    <line x1="28" y1="4" x2="28" y2="18" class="line"/>
    <path d="M42 11 L37 6 L37 16 Z" fill="#5F5E5A"/>
  </g>
  <rect x="190" y="312" width="48" height="22" fill="none" stroke="#888780" stroke-width="0.5" rx="4"/>
  <text x="204" y="326" class="ts">Keep</text>
  <text x="248" y="326" class="ts" style="fill:#888780;">Branch 1 of 3 · 18 tok · Tab accept · Ctrl+] / [ cycle · Esc clear</text>

  <rect x="124" y="386" width="68" height="22" fill="none" stroke="#888780" stroke-width="0.5" rx="4"/>
  <text x="135" y="400" class="ts">End turn</text>
  <text x="200" y="400" class="ts" style="fill:#888780;">model EOS or Cmd+Enter also ends the turn</text>

  <text x="112" y="454" class="ts" style="fill:#888780;">+ next user turn appears here once this assistant turn ends</text>
  <line x1="112" y1="464" x2="668" y2="464" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

  <line x1="0" y1="508" x2="680" y2="508" class="div"/>
  <text x="8" y="528" class="ts">Preset</text>
  <text x="58" y="528" class="ts">Samplers</text>
  <text x="124" y="528" class="ts">Branches 3</text>
  <text x="200" y="528" class="ts">Max tokens 128</text>

  <text x="304" y="528" class="ts" style="fill:#888780;">Display</text>
  <g transform="translate(354, 516)">
    <rect x="0" y="0" width="48" height="20" rx="10" fill="none" stroke="#888780" stroke-width="0.5"/>
    <text x="9" y="12" class="ts" style="fill:#888780;">cards</text>
  </g>
  <g transform="translate(406, 516)">
    <rect x="0" y="0" width="48" height="20" rx="10" fill="#2C2C2A" stroke="#2C2C2A" stroke-width="0.5"/>
    <text x="11" y="12" style="font-size:11px; fill:#FAFAF7; font-family:inherit;">inline</text>
  </g>

  <text x="556" y="528" class="ts">Save</text>
  <rect x="608" y="516" width="64" height="20" fill="#A32D2D" rx="4"/>
  <text x="630" y="530" style="font-size:11px; fill:#FAFAF7; font-family:inherit;">Stop</text>

  <text x="0" y="572" class="ts">Accepted text in normal color flows directly into the lighter-color candidate. No paragraph break, no frame, no subheader between them.</text>
  <text x="0" y="596" class="ts">Cycle chevrons + Keep + meta info on the same row beneath the ghost-text region. End turn at the block's foot. Behavior matches cards: Tab commits, then user clicks Generate for next chunk.</text>
</svg>
